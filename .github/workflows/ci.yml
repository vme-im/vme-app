name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # 用 npm install 而非 npm ci：开发机为 Windows、CI 为 Linux，npm
      # 跨平台 lockfile 会漏记对方平台的 optional 原生/wasm 兜底依赖，
      # npm ci 严格校验会失败；npm install 容忍并自动补全（与 Vercel
      # 默认安装方式一致）。
      - run: npm install

      # 非阻塞：当前存在与本次改动无关的历史 lint 报错
      # （src/components/status/Dashboard.tsx 等），先纳入可见性，
      # 待历史问题清理后可去掉 continue-on-error 转为硬性闸门。
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

# 说明：不在 CI 跑 `next build`，因其会预渲染页面而依赖 DATABASE_URL；
# 生产构建已由 Vercel 在部署时把关，CI 只做轻量、无密钥依赖的检查。
